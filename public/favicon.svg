<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <filter id="glow-orange" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Dark background -->
  <rect width="100" height="100" fill="#0f172a" rx="20" />
  
  <!-- Sun rays (Outer ring) -->
  <g stroke="#ffb703" stroke-width="4" stroke-linecap="round" filter="url(#glow-orange)">
    <line x1="50" y1="12" x2="50" y2="22" />
    <line x1="50" y1="78" x2="50" y2="88" />
    <line x1="12" y1="50" x2="22" y2="50" />
    <line x1="78" y1="50" x2="88" y2="50" />
    <line x1="23" y1="23" x2="30" y2="30" />
    <line x1="70" y1="70" x2="77" y2="77" />
    <line x1="23" y1="77" x2="30" y2="70" />
    <line x1="70" y1="30" x2="77" y2="23" />
  </g>
  
  <!-- Clock face (Inner ring) -->
  <circle cx="50" cy="50" r="22" fill="#1e293b" stroke="#00ffcc" stroke-width="3" filter="url(#glow-cyan)" />
  
  <!-- Clock hands -->
  <g stroke="#00ffcc" stroke-width="3" stroke-linecap="round" filter="url(#glow-cyan)">
    <!-- Minute hand (pointing slightly past 12) -->
    <line x1="50" y1="50" x2="55" y2="33" />
    <!-- Hour hand (pointing towards 4) -->
    <line x1="50" y1="50" x2="62" y2="58" />
  </g>

  <!-- Center dot -->
  <circle cx="50" cy="50" r="4" fill="#ffb703" filter="url(#glow-orange)" />
</svg>